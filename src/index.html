<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/output.css">
  <title>Nasa Daily</title>
  
  <style>
    * {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-700 to-slate-950 border-b-2 border-slate-900">
  <header class="min-h-[20vh]">
    <div class="w-[85%] max-w-[1200px] mx-auto relative">
      <div class="flex flex-col justify-center items-center text-center py-[3vh] gap-1 md:gap-2">
        <h1 class="font-bold text-4xl md:text-7xl text-gray-100">★ Nasa Daily ★</h1>
        <p class="font-extralight text-gray-200 md:text-2xl italic">Veja fotos astronômicas postadas pela <b>NASA</b> diariamente!</p>
      </div>
    </div>
  </header>
  <main>
    <section class="min-h-[80vh]">
      <div class="w-[85%] max-w-[1200px] mx-auto relative">
        <div class="flex flex-col justify-center items-center gap-2 pt-2">
          <div class="flex flex-col justify-center items-center gap-4 md:flex-row">
            <button type="button" class="p-2 border-1 rounded-lg border-gray-100 text-gray-200 bg-gray-700 py-2 px-32 md:px-36 md:text-2xl md:mb-3 transition duration-500 active:bg-gray-100 active:scale-105 active:text-slate-900 hover:bg-gray-100 hover:scale-105 hover:text-slate-900" onclick="loadToday()">
              Foto Atual
            </button>
            <button type="button" class="p-2 border-1 rounded-lg border-gray-100 text-gray-200 bg-gray-700 py-2 px-28 md:px-36 md:text-2xl md:mb-3 transition duration-500 active:bg-gray-100 active:scale-105 active:text-slate-900 hover:bg-gray-100 hover:scale-105 hover:text-slate-900" onclick="loadRandom()">
              Foto Aleatória
            </button>
          </div>
          <label for="date" class="text-gray-200">Escolher Data</label>
          <input type="date" id="date" class="border-1 rounded-lg border-gray-100 text-gray-200 bg-gray-700 px-4 md:text-2xl transition duration-500 active:bg-gray-100 active:scale-105 active:text-slate-900 hover:bg-gray-100 hover:scale-105 hover:text-slate-900">
          
          <div id="loading" class="mt-28 md:mt-36 mx-auto">
            <div id="spinner" class="w-12 h-12 rounded-full animate-spin border-t-4 border-t-gray-200 border-b-4 md:w-16 md:h-16">
              
            </div>
          </div>
          
          <p id="error_message" class="text-2xl text-black z-10 bg-red-700 p-5 rounded-xl"></p>
          
          <div id="informations" class="flex flex-col justify-center gap-3 my-4 md:my-7 bg-gradient-to-b from-slate-700 via-slate-950 to-slate-700 rounded-xl border-2 border-slate-950 max-w-[525px]">
            
            
              
            <img id="photo" src="" alt="" class="rounded-t-xl mx-auto w-auto">
              
            <h2 id="title" class="text-center text-xl text-gray-100 font-bold px-2 md:px-6"></h2>
            
            <p id="photo_date" class="text-center text-gray-200 text-sm px-2 p-b-2 md:px-6 pb-6"></p>
            
            
            
            <p id="copyright" class="text-center text-gray-200 font-normal p-2 md:p-4 text-xs md:text-xs"></p>
          </div>
          
        </div>
        
        
      </div>
    </section>
  </main>
  
  <script src="js/script.js"></script>
</body>
</html>
